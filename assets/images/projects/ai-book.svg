<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI design book, coming soon">
  <rect width="320" height="180" fill="#FFF1C2"/>
  <g stroke="#1B2432" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <!-- book back cover -->
    <rect x="112" y="40" width="96" height="118" rx="8" fill="#0B5FA5"/>
    <!-- book front cover, offset -->
    <rect x="126" y="30" width="96" height="118" rx="8" fill="#1E9BE9"/>
    <!-- title lines on cover -->
    <rect x="140" y="52" width="66" height="12" rx="4" fill="#FFCB2E"/>
    <line x1="140" y1="78" x2="200" y2="78" stroke="#FFFFFF"/>
    <line x1="140" y1="92" x2="188" y2="92" stroke="#FFFFFF"/>
    <!-- little cover emblem -->
    <circle cx="174" cy="120" r="16" fill="#FFF1C2"/>
  </g>
  <!-- AI spark in emblem -->
  <g fill="#FF7A59" stroke="#1B2432" stroke-width="2.5" stroke-linejoin="round">
    <path d="M174 108 l4 9 9 3 -9 4 -4 9 -4 -9 -9 -4 9 -3 z"/>
  </g>
  <!-- floating sparkles -->
  <g fill="#FFCB2E" stroke="#1B2432" stroke-width="3" stroke-linejoin="round">
    <path d="M250 44 l5 12 12 5 -12 5 -5 12 -5 -12 -12 -5 12 -5 z"/>
  </g>
  <circle cx="72" cy="60" r="6" fill="#8A6FE8" stroke="#1B2432" stroke-width="2.5"/>
  <circle cx="66" cy="120" r="4" fill="#4FC2A6" stroke="#1B2432" stroke-width="2.5"/>
</svg>
